<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SK 항공본부 계약현황</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --dark: #4b4b4b;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #f5b400;
      --black: #111827;
      --danger: #dc2626;
      --warn: #f97316;
      --soft-warn: #ca8a04;
      --green: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: #3f3f3f;
      color: white;
      padding: 18px 22px;
      border-bottom: 5px solid var(--accent);
    }

    .header-inner {
      max-width: 1480px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.5px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      font-family: inherit;
    }

    .top-btn {
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.12);
      color: white;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .top-btn:hover {
      background: rgba(255,255,255,0.22);
    }

    main {
      max-width: 1480px;
      margin: 0 auto;
      padding: 16px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1.5fr repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .summary-card {
      background: var(--panel);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
      min-height: 86px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .summary-value {
      font-weight: 800;
      font-size: 24px;
      letter-spacing: -0.4px;
    }

    .toolbar {
      background: var(--panel);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 160px 160px 160px;
      gap: 10px;
      margin-bottom: 14px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    input,
    select {
      width: 100%;
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,180,0,0.15);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border-radius: 14px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title h2 {
      margin: 0;
      font-size: 17px;
    }

    .small-text {
      color: var(--muted);
      font-size: 12px;
    }

    .table-wrap {
      overflow: auto;
      height: calc(68vh - 52px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      font-size: 13px;
      white-space: nowrap;
      vertical-align: middle;
    }

    th {
      background: #f9fafb;
      color: #374151;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    td.amount,
    th.amount {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .item-cell {
      max-width: 420px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item-cell span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-detail-btn {
      width: 13px;
      height: 13px;
      border: 0;
      border-radius: 50%;
      background: var(--black);
      cursor: pointer;
      flex: 0 0 auto;
      padding: 0;
    }

    .mini-detail-btn:hover {
      background: var(--accent);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
    }

    .badge-normal {
      background: #dcfce7;
      color: #166534;
    }

    .badge-90 {
      background: #fef9c3;
      color: #854d0e;
    }

    .badge-30 {
      background: #ffedd5;
      color: #9a3412;
    }

    .badge-expired {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge-unknown {
      background: #e5e7eb;
      color: #374151;
    }

    .detail-btn {
      border: 0;
      background: var(--black);
      color: white;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }

    .detail-btn:hover {
      background: #374151;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .priority-list {
      padding: 10px 12px 14px;
      height: calc(68vh - 52px);
      overflow: auto;
    }

    .priority-item {
      display: grid;
      grid-template-columns: 1fr 58px;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }

    .priority-item:hover .priority-name {
      text-decoration: underline;
    }

    .priority-name {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }

    .priority-days {
      text-align: right;
      font-weight: 800;
      font-size: 13px;
    }

    .priority-red {
      color: #dc2626;
    }

    .priority-orange {
      color: #f97316;
    }

    .priority-black {
      color: #111827;
    }


    .description-panel {
      margin-top: 14px;
      background: var(--panel);
      border-radius: 14px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .description-table-wrap {
      overflow: auto;
      max-height: 52vh;
    }

    .description-table {
      min-width: 1100px;
    }

    .description-table td {
      white-space: normal;
      vertical-align: top;
      line-height: 1.45;
    }

    .description-table .desc-item {
      width: 260px;
      font-weight: 800;
      color: #8a6a00;
    }

    .description-table .desc-text {
      width: 520px;
    }

    .description-table .tracking-text {
      width: 360px;
    }

    .empty {
      padding: 30px;
      color: var(--muted);
      text-align: center;
    }

    .footer {
      color: var(--muted);
      font-size: 12px;
      margin-top: 10px;
      text-align: right;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.48);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      z-index: 9999;
    }

    .modal.hidden {
      display: none;
    }

    .modal-box {
      width: min(840px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: white;
      border-radius: 18px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.28);
    }

    .modal-header {
      background: #3f3f3f;
      color: white;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 4px solid var(--accent);
    }

    .modal-header h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
    }

    .modal-close {
      border: 0;
      background: rgba(255,255,255,0.18);
      color: white;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 24px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .modal-body {
      padding: 18px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
.badge-10 {
  background: #fee2e2;
  color: #991b1b;
}

.badge-30 {
  background: #ffedd5;
  color: #9a3412;
}


    .detail-box {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    .detail-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
    }

    .detail-section {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      background: white;
    }

    .detail-section h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }
#modalPeriod {
  line-height: 1.45;
  word-break: keep-all;
}
    .detail-section p {
      margin: 0;
      white-space: pre-line;
      line-height: 1.6;
      color: #374151;
    }

    .loading {
      padding: 30px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 700px) {
      header {
        padding: 15px 14px;
      }

      .header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      header h1 {
        font-size: 20px;
      }

      main {
        padding: 10px;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .summary-card {
        padding: 12px;
        min-height: 74px;
      }

      .summary-value {
        font-size: 19px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .detail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .table-wrap {
        height: auto;
        max-height: none;
      }

      .priority-list {
        height: auto;
        max-height: 60vh;
      }

      th,
      td {
        font-size: 12px;
      }
    }

    @media print {
      body {
        background: white;
      }

      header {
        background: white;
        color: black;
        border-bottom: 3px solid black;
      }

      .header-actions,
      .toolbar,
      .side-panel,
      .detail-btn,
      .mini-detail-btn,
      .modal,
      .footer {
        display: none !important;
      }

      main {
        max-width: none;
        padding: 0;
      }

      .layout {
        display: block;
      }

      .summary-grid {
        grid-template-columns: repeat(5, 1fr);
      }

      .summary-card,
      .panel,
      .description-panel {
        box-shadow: none;
        border: 1px solid #d1d5db;
      }

      .table-wrap,
      .description-table-wrap {
        height: auto;
        max-height: none;
        overflow: visible;
      }

      table {
        min-width: 0;
        width: 100%;
      }

      th,
      td {
        font-size: 9px;
        padding: 4px 5px;
      }

      .description-table td {
        font-size: 8.5px;
      }

      .panel,
      .description-panel {
        page-break-inside: avoid;
      }

      @page {
        size: A4 landscape;
        margin: 8mm;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <h1 id="pageTitle">SK 항공본부 계약현황</h1>
      <div class="header-actions">
        <button class="top-btn" onclick="refreshData()">새로고침</button>
        <button class="top-btn" onclick="window.print()">PDF 저장 / 인쇄</button>
      </div>
    </div>
  </header>

  <main>
    <section class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">총 합계(KRW)</div>
        <div class="summary-value" id="totalKrw">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">전체 계약 수</div>
        <div class="summary-value" id="totalCount">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">만료</div>
        <div class="summary-value" id="expiredCount">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">10일 이내</div>
        <div class="summary-value" id="expiring10Count">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">30일 이내</div>
        <div class="summary-value" id="expiring30Count">-</div>
      </div>
    </section>

    <section class="toolbar">
    <input id="searchInput" placeholder="품목 검색" />
      <select id="deptFilter">
        <option value="">전체 부서</option>
      </select>
    <select id="statusFilter">
  <option value="">전체 상태</option>
  <option value="만료">만료</option>
  <option value="10일 이내">10일 이내</option>
  <option value="30일 이내">30일 이내</option>

</select>
      <select id="sortSelect">
        <option value="daysAsc">만료 임박순</option>
        <option value="costDesc">비용 높은순</option>
        <option value="deptAsc">부서순</option>
        <option value="itemAsc">품목순</option>
      </select>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="panel-title">
          <h2>계약 목록</h2>
          <div class="small-text" id="listCount">-</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>상태</th>
                <th>부서</th>
                <th>품목</th>
                <th class="amount">단가</th>
                <th>단위</th>
                <th class="amount">수량</th>
                <th class="amount">총 비용(KRW)</th>
                <th>계약시작</th>
                <th>계약종료</th>
                <th class="amount">비중</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="10" class="loading">불러오는 중...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <aside class="side-panel">
        <div class="panel">
          <div class="panel-title">
            <h2>갱신 우선순위</h2>
            <div class="small-text">만료 임박순</div>
          </div>
          <div class="priority-list" id="priorityList">
            <div class="loading">불러오는 중...</div>
          </div>
        </div>
      </aside>
    </section>

    <section class="description-panel">
      <div class="panel-title">
        <h2 id="descriptionTitle">품목 설명</h2>
 
      </div>

      <div class="description-table-wrap">
        <table class="description-table">
          <thead>
            <tr>
              <th>품목</th>
              <th>해당품목에 대한 설명</th>
              <th>품의서 제목 / Tracking 목적</th>
            </tr>
          </thead>
          <tbody id="descriptionBody">
            <tr>
              <td colspan="3" class="loading">불러오는 중...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <div class="footer" id="updatedAt"></div>
  </main>

  <div id="detailModal" class="modal hidden" onclick="modalBackdropClose(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle">품목 상세</h2>
        <button class="modal-close" onclick="closeDetail()">×</button>
      </div>

      <div class="modal-body">
        <div class="detail-grid">
          <div class="detail-box">
            <div class="detail-label">부서</div>
            <div class="detail-value" id="modalDept">-</div>
          </div>

          <div class="detail-box">
            <div class="detail-label">총 비용</div>
            <div class="detail-value" id="modalCost">-</div>
          </div>

          <div class="detail-box">
            <div class="detail-label">계약기간</div>
            <div class="detail-value" id="modalPeriod">-</div>
          </div>

          <div class="detail-box">
            <div class="detail-label">남은 일자</div>
            <div class="detail-value" id="modalDays">-</div>
          </div>
        </div>

        <div class="detail-section">
          <h3>해당품목에 대한 설명</h3>
          <p id="modalDescription">-</p>
        </div>

        <div class="detail-section">
          <h3>품의서 제목 / Tracking 목적</h3>
          <p id="modalTracking">-</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    /****************************************************
     * 여기에 Apps Script 배포 URL 입력
     ****************************************************/
    const API_URL = 'https://script.google.com/macros/s/AKfycbziu1De7KzcQbdAz0BSkWipSIECDpbjTEeKIPCIBg8BgDLQ6Ch9bR_IvDx_J4WxI7lS/exec';

    let allItems = [];
    let filteredItems = [];

    document.addEventListener('DOMContentLoaded', () => {
      bindEvents();
      loadData(false);
    });

    function bindEvents() {
      document.getElementById('searchInput').addEventListener('input', applyFilters);
      document.getElementById('deptFilter').addEventListener('change', applyFilters);
      document.getElementById('statusFilter').addEventListener('change', applyFilters);
      document.getElementById('sortSelect').addEventListener('change', applyFilters);

      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
          closeDetail();
        }
      });
    }

    function loadData(refresh) {
      setLoading();

      const callbackName = 'subscriptionCallback_' + Date.now();

      window[callbackName] = function(response) {
        delete window[callbackName];

        if (!response || !response.ok) {
          renderError(response && response.message ? response.message : '데이터를 불러오지 못했습니다.');
          return;
        }

        allItems = response.items || [];
        setupDeptFilter(response.depts || []);
        applyFilters();

        document.getElementById('updatedAt').textContent =
          '업데이트: ' + formatDateTime(response.generatedAt);
      };

      const script = document.createElement('script');
      script.src = API_URL
        + '?callback=' + encodeURIComponent(callbackName)
        + (refresh ? '&refresh=1' : '');

      script.onerror = function() {
        renderError('API 호출 실패. Apps Script 배포 URL 또는 웹 앱 권한을 확인하세요.');
      };

      document.body.appendChild(script);
    }

    function refreshData() {
      loadData(true);
    }

    function setLoading() {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="10" class="loading">불러오는 중...</td></tr>';

      document.getElementById('descriptionBody').innerHTML =
        '<tr><td colspan="3" class="loading">불러오는 중...</td></tr>';

      document.getElementById('priorityList').innerHTML =
        '<div class="loading">불러오는 중...</div>';
    }

    function setupDeptFilter(depts) {
      const select = document.getElementById('deptFilter');
      const current = select.value;

      select.innerHTML = '<option value="">전체 부서</option>';

      depts.forEach(dept => {
        const option = document.createElement('option');
        option.value = dept;
        option.textContent = dept;
        select.appendChild(option);
      });

      select.value = current;
    }

    function applyFilters() {
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
      const dept = document.getElementById('deptFilter').value;
      const status = document.getElementById('statusFilter').value;
      const sortValue = document.getElementById('sortSelect').value;

filteredItems = allItems.filter(item => {
  const itemName = String(item.item || '').toLowerCase();

  // 기본 검색은 품목명만 대상으로 함
  const matchKeyword = !keyword || itemName.includes(keyword);

  const matchDept = !dept || item.dept === dept;
  const matchStatus = !status || item.status === status;

  return matchKeyword && matchDept && matchStatus;
});
      sortItems(filteredItems, sortValue);

      renderSummary(filteredItems);
      renderTable(filteredItems);
      renderDescriptions(filteredItems);
      renderPriorityList(filteredItems);
      updateTitle();
    }

    function sortItems(items, sortValue) {
      if (sortValue === 'costDesc') {
        items.sort((a, b) => toNumber(b.totalKrw) - toNumber(a.totalKrw));
      } else if (sortValue === 'deptAsc') {
        items.sort((a, b) => String(a.dept || '').localeCompare(String(b.dept || ''), 'ko'));
      } else if (sortValue === 'itemAsc') {
        items.sort((a, b) => String(a.item || '').localeCompare(String(b.item || ''), 'ko'));
      } else {
        items.sort((a, b) => normalizeDays(a.daysLeft) - normalizeDays(b.daysLeft));
      }
    }

    function renderSummary(items) {
      const summary = buildClientSummary(items);

      document.getElementById('totalKrw').textContent = formatKrw(summary.totalKrw);
      document.getElementById('totalCount').textContent = formatNumber(summary.count);
      document.getElementById('expiredCount').textContent = formatNumber(summary.expired);
      document.getElementById('expiring10Count').textContent = formatNumber(summary.expiring10);
      document.getElementById('expiring30Count').textContent = formatNumber(summary.expiring30);
    }

    function buildClientSummary(items) {
      const summary = {
        totalKrw: 0,
        count: items.length,
        expired: 0,
        expiring10: 0,
        expiring30: 0
      };

      items.forEach(item => {
        summary.totalKrw += toNumber(item.totalKrw);

        if (item.status === '만료') summary.expired++;
        else if (item.status === '10일 이내') summary.expiring10++;
        else if (item.status === '30일 이내') summary.expiring30++;
      });

      return summary;
    }

    function renderTable(items) {
      const tbody = document.getElementById('tableBody');
      document.getElementById('listCount').textContent = `${items.length}건`;

      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="10" class="empty">표시할 계약 데이터가 없습니다.</td></tr>';
        return;
      }

      tbody.innerHTML = items.map(item => `
        <tr>
          <td>${statusBadge(item.status)}</td>
          <td>${escapeHtml(item.dept || '')}</td>
          <td class="item-cell" title="${escapeHtmlAttr(item.item || '')}">
            <button class="mini-detail-btn" onclick="openDetail('${escapeJs(item.item)}')" title="상세보기" aria-label="상세보기"></button>
            <span>${escapeHtml(item.item || '')}</span>
          </td>
          <td class="amount">${formatNumberOrDash(item.unitPrice)}</td>
          <td>${escapeHtml(item.currency || '')}</td>
          <td class="amount">${formatNumberOrDash(item.qty)}</td>
          <td class="amount">${formatKrwOrDash(item.totalKrw)}</td>
          <td>${escapeHtml(item.startDate || '')}</td>
          <td>${escapeHtml(item.endDate || '')}</td>
          <td class="amount">${escapeHtml(item.weightDisplay || '')}</td>
        </tr>
      `).join('');
    }

    function renderDescriptions(items) {
      const tbody = document.getElementById('descriptionBody');
      const rows = items.filter(item => item.description || item.trackingTitle);

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">표시할 품목 설명이 없습니다.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(item => `
        <tr>
          <td class="desc-item">${escapeHtml(item.item || '')}</td>
          <td class="desc-text">${escapeHtml(item.description || '')}</td>
          <td class="tracking-text">${escapeHtml(item.trackingTitle || '')}</td>
        </tr>
      `).join('');
    }

    function renderPriorityList(items) {
      const el = document.getElementById('priorityList');

      const rows = items
        .filter(item => item.daysLeft !== '' && item.daysLeft !== null && item.daysLeft !== undefined)
        .slice()
        .sort((a, b) => normalizeDays(a.daysLeft) - normalizeDays(b.daysLeft));

      if (!rows.length) {
        el.innerHTML = '<div class="empty">표시할 우선순위가 없습니다.</div>';
        return;
      }

      el.innerHTML = rows.map(item => {
        const dayClass = getPriorityDayClass(item.daysLeft);

        return `
          <div class="priority-item" onclick="openDetail('${escapeJs(item.item)}')">
            <div class="priority-name">${escapeHtml(item.item || '')}</div>
            <div class="priority-days ${dayClass}">${formatDays(item.daysLeft)}</div>
          </div>
        `;
      }).join('');
    }

    function getPriorityDayClass(days) {
      const n = Number(days);

      if (isNaN(n)) return 'priority-black';
      if (n <= 10) return 'priority-red';
      if (n <= 30) return 'priority-orange';

      return 'priority-black';
    }

    function updateTitle() {
      const dept = document.getElementById('deptFilter').value;
      const title = dept ? `${dept} 계약현황` : 'SK 항공본부 계약현황';

      document.getElementById('pageTitle').textContent = title;
      document.getElementById('descriptionTitle').textContent = dept ? `${dept} 품목 설명` : '품목 설명';
    }

    function openDetail(itemName) {
      const item = allItems.find(v => v.item === itemName);

      if (!item) return;

      document.getElementById('modalTitle').textContent = item.item || '품목 상세';
      document.getElementById('modalDept').textContent = item.dept || '-';
      document.getElementById('modalCost').textContent = formatKrwOrDash(item.totalKrw);
document.getElementById('modalPeriod').innerHTML =
  `${escapeHtml(item.startDate || '-')} ~<br>${escapeHtml(item.endDate || '-')}`;
      document.getElementById('modalDays').textContent = formatDays(item.daysLeft);

      document.getElementById('modalDescription').textContent =
        item.description || '등록된 설명이 없습니다.';

      document.getElementById('modalTracking').textContent =
        item.trackingTitle || '등록된 품의서 제목이 없습니다.';

      document.getElementById('detailModal').classList.remove('hidden');
    }

    function closeDetail() {
      document.getElementById('detailModal').classList.add('hidden');
    }

    function modalBackdropClose(event) {
      if (event.target && event.target.id === 'detailModal') {
        closeDetail();
      }
    }

function statusBadge(status) {
  if (status === '정상') {
    return '';
  }

  let cls = 'badge-unknown';

  if (status === '10일 이내') cls = 'badge-10';
  else if (status === '30일 이내') cls = 'badge-30';
  else if (status === '만료') cls = 'badge-expired';

  return `<span class="badge ${cls}">${escapeHtml(status || '확인필요')}</span>`;
}

    function formatDays(value) {
      if (value === '' || value === null || value === undefined || isNaN(Number(value))) {
        return '-';
      }

      return `${Number(value).toLocaleString('ko-KR')}일`;
    }

    function formatKrw(value) {
      return `${Number(value || 0).toLocaleString('ko-KR')}원`;
    }

    function formatKrwOrDash(value) {
      if (value === null || value === undefined || value === '' || isNaN(Number(value))) {
        return '-';
      }

      return `${Number(value).toLocaleString('ko-KR')}원`;
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('ko-KR');
    }

    function formatNumberOrDash(value) {
      if (value === null || value === undefined || value === '' || isNaN(Number(value))) {
        return '-';
      }

      return Number(value).toLocaleString('ko-KR');
    }

    function formatDateTime(value) {
      if (!value) return '';
      return new Date(value).toLocaleString('ko-KR');
    }

    function toNumber(value) {
      const n = Number(value);
      return isNaN(n) ? 0 : n;
    }

    function normalizeDays(value) {
      const n = Number(value);
      return isNaN(n) ? 999999 : n;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeHtmlAttr(value) {
      return escapeHtml(value).replaceAll('\n', ' ');
    }

    function escapeJs(value) {
      return String(value ?? '')
        .replaceAll('\\', '\\\\')
        .replaceAll("'", "\\'")
        .replaceAll('"', '\\"')
        .replaceAll('\n', '\\n')
        .replaceAll('\r', '');
    }

    function renderError(message) {
      document.getElementById('tableBody').innerHTML =
        `<tr><td colspan="10" class="empty">${escapeHtml(message)}</td></tr>`;

      document.getElementById('descriptionBody').innerHTML =
        `<tr><td colspan="3" class="empty">${escapeHtml(message)}</td></tr>`;

      document.getElementById('priorityList').innerHTML =
        `<div class="empty">${escapeHtml(message)}</div>`;
    }
  </script>
</body>
</html>
